[*]
parallel = 1                        # number of server slots (concurrent request slots)
fit-target = 512                    # target memory margin per device in MiB for --fit
flash-attn = on                     # enable Flash Attention
# the following does not work with --mmproj
#
spec-type = ngram-mod               # speculative decoding type when no draft model is provided
# Look at the last 24 tokens, hash them, and if you've seen this exact sequence before, give me the next token.
spec-ngram-mod-n-match = 24             # n-gram lookup length for ngram-style speculative decoding
# minimum number of tokens the AI must guess before it stops and asks the main model to verify them
spec-draft-n-min = 4                      # minimum draft tokens for speculative decoding
# maximum number of tokens the AI is allowed to guess in one go.
spec-draft-n-max = 64                     # maximum draft tokens for speculative decoding

[gemma-4-26b]
model = ./models/gemma-4-26b/gemma-4-26B-A4B-it-Q8_0.gguf # path to the GGUF model file
ctx-size = 262144                   # size of the prompt context window (max tokens)
# SEVERE DEGRADATION WHEN USING KV cache quantization FOR GEMMA https://localbench.substack.com/p/kv-cache-quantization-benchmark
threads = 11                        # number of CPU threads
temp = 0.2                          # sampling temperature
top-k = 64                          # restrict to k highest-probability tokens
top-p = 0.95                        # nucleus sampling: cumulative probability threshold
frequency-penalty = 1.0             # penalize tokens based on how often they appear
repeat-penalty = 1.1                # penalize repeated tokens (repeat alpha)

[gemma-4-26b-multimodal]
model = ./models/gemma-4-26b/gemma-4-26B-A4B-it-Q8_0.gguf
ctx-size = 262144
# SEVERE DEGRADATION WHEN USING KV cache quantization FOR GEMMA https://localbench.substack.com/p/kv-cache-quantization-benchmark
threads = 11
temp = 0.3
top-k = 64
top-p = 0.95
frequency-penalty = 1.0
repeat-penalty = 1.1

# Multimodal support
mmproj = ./models/gemma-4-26b/multimodal/mmproj-BF16.gguf # path to multimodal projector file
image-min-tokens = 300              # min tokens per image (dynamic resolution)
image-max-tokens = 512              # max tokens per image (dynamic resolution)

[qwen3.6-35b]
model = ./models/qwen3.6-35b/Qwen3.6-35B-A3B-UD-Q6_K_XL.gguf
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
threads = 11
temp = 0.6
top-k = 20
top-p = 0.95
min-p = 0.0                         # min prob relative to most-likely token (0.0=disabled)
presence-penalty = 0.0              # penalize tokens that appear anywhere in sequence
frequency-penalty = 1.0
repeat-penalty = 1.0
chat-template-kwargs = {"preserve_thinking":true} # JSON params for chat template parser

[qwen3.6-35b-multimodal]
model = ./models/qwen3.6-35b/Qwen3.6-35B-A3B-UD-Q6_K_XL.gguf
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
threads = 11
temp = 0.6
top-k = 20
top-p = 0.95
min-p = 0.0
presence-penalty = 0.0
frequency-penalty = 1.0
repeat-penalty = 1.0
chat-template-kwargs = {"preserve_thinking":true}

# Multimodal support
mmproj = ./models/qwen3.6-35b/multimodal/mmproj-BF16.gguf
image-min-tokens = 300
image-max-tokens = 512

